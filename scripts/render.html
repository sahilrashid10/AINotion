<!doctype html>
<meta charset="utf-8" />
<canvas id="c" width="1280" height="720"></canvas>
<script>
const W = 1280, H = 720;
const cv = document.getElementById("c");
const ctx = cv.getContext("2d");
const AMBER = "255,122,24";
const BONE = "236,231,223";
const FPS = 24, DUR = 8;

// deterministic rng
function rng(seed) {
  let s = seed >>> 0;
  return () => ((s = (s * 1664525 + 1013904223) >>> 0) / 4294967296);
}

function glow(x, y, r, rgb, a) {
  const g = ctx.createRadialGradient(x, y, 0, x, y, r);
  g.addColorStop(0, `rgba(${rgb},${a})`);
  g.addColorStop(0.5, `rgba(${rgb},${a * 0.35})`);
  g.addColorStop(1, `rgba(${rgb},0)`);
  ctx.fillStyle = g;
  ctx.fillRect(x - r, y - r, r * 2, r * 2);
}

function vignette(strength) {
  const g = ctx.createRadialGradient(W / 2, H / 2, H * 0.35, W / 2, H / 2, H * 0.95);
  g.addColorStop(0, "rgba(5,5,7,0)");
  g.addColorStop(1, `rgba(5,5,7,${strength})`);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

function grain(t, amount) {
  const r = rng(Math.floor(t * 24) * 7919 + 13);
  ctx.fillStyle = `rgba(${BONE},${amount})`;
  for (let i = 0; i < 400; i++) {
    ctx.fillRect(r() * W, r() * H, 1.2, 1.2);
  }
}

function base() {
  ctx.fillStyle = "#0b0b0d";
  ctx.fillRect(0, 0, W, H);
}

function dust(t, seed, count, drift) {
  const r = rng(seed);
  for (let i = 0; i < count; i++) {
    const sp = 6 + r() * 20;
    const x = ((r() * W + t * drift * sp) % (W + 40)) - 20;
    const y = ((r() * H - t * sp * 0.4) % (H + 40) + H + 40) % (H + 40) - 20;
    ctx.fillStyle = `rgba(${AMBER},${0.08 + r() * 0.3})`;
    ctx.beginPath();
    ctx.arc(x, y, 0.6 + r() * 1.6, 0, 7);
    ctx.fill();
  }
}

const CODE = [
  "$ fabric pipeline deploy --env prod",
  "> lakehouse.medallion.bronze  OK",
  "> eventstream.ingest  streaming...",
  "SELECT sales_id, region, revenue",
  "  FROM gold.sales_events;",
  "> direct_lake.refresh()  200ms",
  "$ adf pipeline run --incremental",
  "> databricks: pyspark notebook",
  "> synapse.sql: serverless OK",
  "> azure.ai: endpoint ready",
];

// ---------- 1. HERO: TERMINAL BOOT ----------
function terminalBoot(t) {
  base();
  const push = 1 + t * 0.035; // slow push-in
  ctx.save();
  ctx.translate(W / 2, H / 2);
  ctx.scale(push, push);
  ctx.translate(-W / 2, -H / 2);

  glow(W * 0.5, H * 0.42, H * 0.9, AMBER, 0.10 + Math.sin(t * 0.8) * 0.015);

  // floating holographic terminal
  const tw = W * 0.46, th = H * 0.5;
  const tx = W / 2 - tw / 2, ty = H * 0.20 + Math.sin(t * 0.7) * 6;
  ctx.strokeStyle = `rgba(${AMBER},0.85)`;
  ctx.lineWidth = 1.5;
  ctx.fillStyle = "rgba(9,9,12,0.82)";
  ctx.beginPath();
  ctx.roundRect(tx, ty, tw, th, 10);
  ctx.fill();
  ctx.stroke();
  // title bar
  ctx.fillStyle = `rgba(${AMBER},0.16)`;
  ctx.beginPath();
  ctx.roundRect(tx, ty, tw, 30, [10, 10, 0, 0]);
  ctx.fill();
  ctx.fillStyle = `rgba(${AMBER},0.9)`;
  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    ctx.arc(tx + 18 + i * 18, ty + 15, 4, 0, 7);
    ctx.fill();
  }

  // boot: first 2s progress bar, then code lines type on
  ctx.font = "16px monospace";
  if (t < 2) {
    const p = t / 2;
    ctx.fillStyle = `rgba(${BONE},0.8)`;
    ctx.fillText("initializing data runtime...", tx + 22, ty + 66);
    ctx.strokeStyle = `rgba(${AMBER},0.6)`;
    ctx.strokeRect(tx + 22, ty + 84, tw - 44, 14);
    ctx.fillStyle = `rgba(${AMBER},0.85)`;
    ctx.fillRect(tx + 24, ty + 86, (tw - 48) * p, 10);
  } else {
    const lines = Math.min(CODE.length, Math.floor((t - 2) * 2.2) + 1);
    for (let i = 0; i < lines; i++) {
      const line = CODE[i];
      const isLast = i === lines - 1;
      const chars = isLast ? Math.floor(((t - 2) * 2.2 % 1) * line.length + 1) : line.length;
      ctx.fillStyle = line.startsWith("$") || line.startsWith(">") ? `rgba(${AMBER},0.9)` : `rgba(${BONE},0.85)`;
      ctx.fillText(line.slice(0, chars), tx + 22, ty + 62 + i * 26);
    }
    if (Math.floor(t * 2.5) % 2 === 0) {
      ctx.fillStyle = `rgba(${AMBER},0.9)`;
      ctx.fillRect(tx + 22 + 9.6 * (CODE[Math.min(lines - 1, CODE.length - 1)].length % 40), ty + 50 + (lines - 1) * 26, 9, 16);
    }
  }

  // reflection pool under terminal
  ctx.save();
  ctx.globalAlpha = 0.12;
  ctx.translate(0, (ty + th) * 2 + 24);
  ctx.scale(1, -1);
  ctx.fillStyle = `rgba(${AMBER},0.5)`;
  ctx.fillRect(tx, ty, tw, th);
  ctx.restore();

  dust(t, 42, 60, 1);
  ctx.restore();
  vignette(0.88);
  grain(t, 0.05);
}

// ---------- 2. THE BUILDER ----------
function builder(t) {
  base();
  const dolly = t * 46; // sideways dolly
  glow(W * 0.78 - dolly * 0.1, H * 0.3, H * 0.8, AMBER, 0.09);

  // parallax rows of floating UI panels
  const layers = [
    { speed: 0.55, y: H * 0.18, s: 0.7, alpha: 0.35, seed: 7 },
    { speed: 0.8, y: H * 0.42, s: 0.95, alpha: 0.6, seed: 19 },
    { speed: 1.15, y: H * 0.66, s: 1.25, alpha: 0.85, seed: 31 },
  ];
  for (const L of layers) {
    const r = rng(L.seed);
    for (let i = 0; i < 7; i++) {
      const pw = (170 + r() * 130) * L.s;
      const ph = (100 + r() * 80) * L.s;
      const gap = 320 * L.s + r() * 140;
      let x = ((i * gap - dolly * L.speed) % (W + pw * 2 + 600));
      if (x < -pw - 300) x += W + pw * 2 + 600;
      x -= pw;
      const y = L.y + Math.sin(t * 0.6 + i * 1.7) * 10 * L.s - ph / 2;

      ctx.fillStyle = `rgba(12,12,16,${0.85 * L.alpha})`;
      ctx.strokeStyle = `rgba(${AMBER},${0.7 * L.alpha})`;
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.roundRect(x, y, pw, ph, 8);
      ctx.fill();
      ctx.stroke();
      // fake chart content
      ctx.strokeStyle = `rgba(${AMBER},${0.45 * L.alpha})`;
      ctx.beginPath();
      for (let k = 0; k <= 8; k++) {
        const cx = x + 14 + (k / 8) * (pw - 28);
        const cy = y + ph - 16 - (0.3 + 0.5 * Math.abs(Math.sin(k * 1.3 + i * 2 + L.seed))) * (ph - 40);
        k ? ctx.lineTo(cx, cy) : ctx.moveTo(cx, cy);
      }
      ctx.stroke();
      ctx.fillStyle = `rgba(${BONE},${0.5 * L.alpha})`;
      ctx.fillRect(x + 14, y + 12, pw * 0.4, 4);
    }
  }

  // floor line hint
  ctx.fillStyle = `rgba(${AMBER},0.05)`;
  ctx.fillRect(0, H * 0.86, W, 1.5);
  dust(t, 99, 50, 2);
  vignette(0.9);
  grain(t, 0.05);
}

// ---------- 3. THE TEACHER ----------
function teacher(t) {
  base();
  const push = 1 + t * 0.03;
  ctx.save();
  ctx.translate(W / 2, H / 2);
  ctx.scale(push, push);
  ctx.translate(-W / 2, -H / 2);

  // key light blooming on over first 3s
  const bloomIn = Math.min(1, t / 3);
  const flicker = 1 + Math.sin(t * 5.2) * 0.02 + Math.sin(t * 13.7) * 0.012;
  glow(W * 0.68, H * 0.24, H * 0.95, AMBER, 0.16 * bloomIn * flicker);
  glow(W * 0.68, H * 0.24, H * 0.35, AMBER, 0.22 * bloomIn * flicker);
  // practical: soft screen light from below-left
  glow(W * 0.22, H * 0.86, H * 0.5, BONE, 0.05 * bloomIn);

  // light beam
  ctx.save();
  ctx.globalAlpha = 0.05 * bloomIn;
  ctx.fillStyle = `rgb(${AMBER})`;
  ctx.beginPath();
  ctx.moveTo(W * 0.68, -40);
  ctx.lineTo(W * 0.30, H + 40);
  ctx.lineTo(W * 0.95, H + 40);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // silhouetted desk edge
  ctx.fillStyle = "rgba(6,6,8,0.92)";
  ctx.fillRect(0, H * 0.82, W, H * 0.2);
  ctx.fillStyle = `rgba(${AMBER},${0.12 * bloomIn})`;
  ctx.fillRect(0, H * 0.82, W, 2);

  dust(t, 7, 90, 0.7);
  ctx.restore();
  vignette(0.95);
  grain(t, 0.06);
}

// ---------- 4. THE CLOSER ----------
function closer(t) {
  base();
  const speed = t * 0.55; // forward motion
  const flare = Math.max(0, (t - 6) / 2); // screens flare in last 2s
  const vx = W / 2, vy = H * 0.47;

  glow(vx, vy, H * (0.5 + flare * 0.7), AMBER, 0.12 + flare * 0.25);

  // corridor of dashboard panels on both walls
  for (let i = 14; i >= 0; i--) {
    let z = ((i * 0.9 - speed) % 12.6 + 12.6) % 12.6 + 0.7;
    const persp = 1 / z;
    const ph = H * 1.1 * persp;
    const pw = ph * 0.62;
    const wall = W * 1.15 * persp;
    const alpha = Math.min(1, Math.max(0, (1.6 - persp * 0.32))) * Math.min(1, persp * 2.4);
    const bright = 0.55 + flare * 0.45;
    for (const side of [-1, 1]) {
      const x = vx + side * wall - pw / 2;
      const y = vy - ph * 0.45;
      ctx.fillStyle = `rgba(12,12,16,${0.85 * alpha})`;
      ctx.strokeStyle = `rgba(${AMBER},${bright * alpha})`;
      ctx.lineWidth = Math.max(0.6, 2 * persp);
      ctx.beginPath();
      ctx.roundRect(x, y, pw, ph * 0.9, 6 * persp + 2);
      ctx.fill();
      ctx.stroke();
      // dashboard bars
      ctx.fillStyle = `rgba(${AMBER},${0.5 * bright * alpha})`;
      for (let b = 0; b < 4; b++) {
        const bh = ph * 0.1 * (0.4 + 0.6 * Math.abs(Math.sin(b * 2.1 + i * 1.3)));
        ctx.fillRect(x + pw * 0.14 + b * pw * 0.2, y + ph * 0.72 - bh, pw * 0.12, bh);
      }
    }
  }

  // floor reflection strip
  const fg = ctx.createLinearGradient(0, vy, 0, H);
  fg.addColorStop(0, `rgba(${AMBER},${0.06 + flare * 0.1})`);
  fg.addColorStop(1, "rgba(11,11,13,0)");
  ctx.fillStyle = fg;
  ctx.fillRect(0, vy, W, H - vy);

  dust(t, 55, 40, 1.4);
  vignette(0.9 - flare * 0.2);
  grain(t, 0.05);

  // end flare wash
  if (flare > 0) {
    ctx.fillStyle = `rgba(${AMBER},${flare * 0.08})`;
    ctx.fillRect(0, 0, W, H);
  }
}

const SCENES = { "hero-terminal-boot": terminalBoot, "the-builder": builder, "the-teacher": teacher, "the-closer": closer };

window.drawFrame = (scene, frame) => {
  SCENES[scene](frame / FPS);
  return true;
};
window.frameData = () => cv.toDataURL("image/jpeg", 0.93);
</script>
